{% extends "base.html" %}
{% block title %}Write a Review – {{ item.title }}{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('index') }}">Home</a> /
  <a href="{{ url_for('item_detail', item_id=item.id) }}">{{ item.title }}</a> /
  Write a Review
</div>

<div class="form-container">
  <h1>Write a Review</h1>
  <p class="form-subtitle">Reviewing: <strong>{{ item.title }}</strong> ({{ item.class_name }})</p>

  <form method="post" action="{{ url_for('new_review', item_id=item.id) }}">
    <div class="form-group">
      <label for="title">Review Title <span class="required">*</span></label>
      <input type="text" id="title" name="title" required
             placeholder="Summarise your experience" maxlength="150"/>
    </div>

    <div class="form-group">
      <label for="review_text">Your Review <span class="required">*</span></label>
      <textarea id="review_text" name="review_text" rows="6" required
                placeholder="Describe what you liked or disliked…"></textarea>
    </div>

    <div class="form-group form-row">
      <div>
        <label for="rating">Rating <span class="required">*</span></label>
        <select id="rating" name="rating">
          <option value="5">★★★★★ (5) – Excellent</option>
          <option value="4">★★★★☆ (4) – Good</option>
          <option value="3" selected>★★★☆☆ (3) – Average</option>
          <option value="2">★★☆☆☆ (2) – Poor</option>
          <option value="1">★☆☆☆☆ (1) – Terrible</option>
        </select>
      </div>
      <div>
        <label for="age">Your Age</label>
        <input type="number" id="age" name="age" min="18" max="99" placeholder="e.g. 35"/>
      </div>
    </div>

    <div class="form-actions">
      <a class="btn" href="{{ url_for('item_detail', item_id=item.id) }}">Cancel</a>
      <button class="btn btn-primary" type="submit">Get Recommendation Label</button>
    </div>
  </form>
</div>
{% endblock %}
